# nixpacks.toml - Konfigurasi build Railway untuk Laravel + Vite
# Memberitahu Railway untuk install PHP, Node.js, dan build assets

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install --no-audit"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:clear",
    "php artisan view:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
