
[phases.setup]
cmds = ["apt-get update && apt-get install -y zip unzip libpng-dev libjpeg-dev libfreetype6-dev && docker-php-ext-install gd zip pdo_mysql"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT}"

[variables]
APP_ENV = "production"
APP_DEBUG = "false"
PHP_VERSION = "8.4"
