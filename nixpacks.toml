# nixpacks.toml - Konfigurasi build Railway untuk Laravel + Vite
# Railway Root Directory harus di-set ke: WebAdmin

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci --no-audit"
]

[phases.build]
cmds = [
    "npm run build"
]

[start]
cmd = "bash scripts/deploy.sh && php artisan serve --host=0.0.0.0 --port=$PORT"

