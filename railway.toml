[build]
builder = "nixpacks"
phases = [
    "apt-get update && apt-get install -y libpng-dev libjpeg-dev libfreetype6-dev && docker-php-ext-configure gd --with-freetype --with-jpeg && docker-php-ext-install gd && docker-php-ext-install zip",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci",
    "npm run build"
]

[nixpacks]
provider = "ubuntu"
phpVersion = "8.4"

[nixpacks.physicalPackages]
php8.4-mysql = ""
php8.4-sqlite3 = ""

[deploy]
startCommand = "php -S 0.0.0.0:${PORT:-8000} public/index.php"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
