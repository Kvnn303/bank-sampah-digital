[build]
builder = "nixpacks"
buildCommand = "bash -c 'composer install --optimize-autoloader --no-interaction && bash scripts/deploy.sh && npm ci && npm run build'"

[deploy]
startCommand = "php -S 0.0.0.0:${PORT:-8000} public/router.php"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
startTimeout = 300
